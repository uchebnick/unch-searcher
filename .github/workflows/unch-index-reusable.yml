name: unch-index-reusable

on:
  workflow_call:
    inputs:
      force_rebuild:
        description: Ignore the published snapshot and rebuild the index from scratch
        required: false
        default: false
        type: boolean
      skip_remote_restore:
        description: Skip downloading the published snapshot before indexing
        required: false
        default: false
        type: boolean
      skip_publish:
        description: Build the index but do not publish it back to gh-pages
        required: false
        default: false
        type: boolean
      unch_repository:
        description: Repository that provides the unch source used to build the CLI
        required: false
        default: uchebnick/unch
        type: string
      unch_ref:
        description: Git ref from the unch repository used to build the CLI
        required: false
        default: v0.3.6
        type: string

permissions:
  contents: write

jobs:
  index:
    name: build-search-index
    runs-on: ubuntu-latest
    env:
      FORCE_REBUILD: ${{ inputs.force_rebuild && 'true' || 'false' }}
      SKIP_REMOTE_RESTORE: ${{ inputs.skip_remote_restore && 'true' || 'false' }}
      UNCH_REPOSITORY: ${{ inputs.unch_repository }}
      UNCH_REF: ${{ inputs.unch_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.3'

      - name: Build unch from source
        shell: bash
        run: |
          set -euo pipefail
          tool_dir="${RUNNER_TEMP}/unch-source"
          bin_dir="${RUNNER_TEMP}/unch-bin"
          probe_dir="${RUNNER_TEMP}/unch-probe"
          rm -rf "$tool_dir" "$bin_dir" "$probe_dir"
          mkdir -p "$bin_dir"
          if [ "${UNCH_REPOSITORY}" = "${GITHUB_REPOSITORY}" ] && [ "${UNCH_REF}" = "${GITHUB_SHA}" ]; then
            go build -trimpath -o "$bin_dir/unch" ./cmd/unch
          else
            mkdir -p "$tool_dir"
            (
              cd "$tool_dir"
              git init -q
              git remote add origin "https://github.com/${UNCH_REPOSITORY}.git"
              git fetch --depth 1 origin "${UNCH_REF}"
              git checkout --detach FETCH_HEAD
              go build -trimpath -o "$bin_dir/unch" ./cmd/unch
            )
          fi
          export PATH="$bin_dir:$PATH"
          echo "$bin_dir" >> "$GITHUB_PATH"
          echo "::group::Tooling"
          echo "Using ${UNCH_REPOSITORY}@${UNCH_REF}"
          command -v unch
          unch create ci --root "$probe_dir" >/dev/null 2>&1
          find "$probe_dir" -maxdepth 3 -type f | sort
          echo "::endgroup::"

      - name: Restore published remote index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ci_url="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/unch-index.yml"
          mkdir -p .semsearch/logs
          echo "::group::Bind CI manifest"
          unch bind ci --root . "$ci_url"
          cat .semsearch/manifest.json
          echo "::endgroup::"
          echo "::group::Restore published remote index"
          if [ "${FORCE_REBUILD}" = "true" ]; then
            echo "::notice::Force rebuild requested; skipping published remote index restore"
          elif [ "${SKIP_REMOTE_RESTORE}" = "true" ]; then
            echo "::notice::Published remote index restore skipped by workflow input"
          else
            unch remote sync --root . --allow-missing
            if [ -f .semsearch/index.db ]; then
              echo "::notice::Using the published remote index as the starting snapshot"
            else
              echo "::notice::No compatible published remote index was restored; building from scratch"
            fi
          fi
          if [ -f .semsearch/manifest.json ]; then
            cat .semsearch/manifest.json
          fi
          echo "::endgroup::"

      - name: Build local search index
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SEMSEARCH_YZMA_VERSION: b8581
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .semsearch/logs
          echo "::group::unch init"
          unch init --root .
          echo "::endgroup::"
          echo "::group::unch index"
          unch index --root . 2>&1 | tee .semsearch/logs/unch-index.log
          echo "::endgroup::"
          echo "::group::Bind remote manifest"
          ci_url="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/unch-index.yml"
          unch bind ci --root . "$ci_url"
          cat .semsearch/manifest.json
          echo "::endgroup::"
          echo "::group::Generated search artifacts"
          find .semsearch -maxdepth 2 -type f | sort
          echo
          ls -lah .semsearch
          echo "::endgroup::"
          echo "::group::Manifest"
          cat .semsearch/manifest.json
          echo "::endgroup::"

      - name: Render GitHub summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Search Index"
            echo
            echo "- Repository: <code>${GITHUB_REPOSITORY}</code>"
            echo "- Ref: <code>${GITHUB_REF_NAME}</code>"
            echo "- Commit: <code>${GITHUB_SHA::7}</code>"
            echo "- Tool source: <code>${UNCH_REPOSITORY}@${UNCH_REF}</code>"
            echo
            echo "### Manifest"
            echo
            echo '<pre>'
            if [ -f .semsearch/manifest.json ]; then
              cat .semsearch/manifest.json
            else
              echo "{}"
            fi
            echo '</pre>'
            if [ -f .semsearch/logs/unch-index.log ]; then
              echo
              echo "### Index log tail"
              echo
              echo '<pre>'
              tail -n 80 .semsearch/logs/unch-index.log
              echo '</pre>'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload search index
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: semsearch-index
          path: |
            .semsearch/index.db
            .semsearch/filehashes.db
            .semsearch/manifest.json
            .semsearch/logs/
          if-no-files-found: warn

  publish:
    name: publish-search-index
    runs-on: ubuntu-latest
    needs: index
    if: ${{ needs.index.result == 'success' && !inputs.skip_publish }}

    steps:
      - name: Download search index artifact
        uses: actions/download-artifact@v8
        with:
          name: semsearch-index
          path: semsearch-artifact

      - name: Publish remote search index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="${RUNNER_TEMP}/gh-pages"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          artifact_dir="${PWD}/semsearch-artifact"
          rm -rf "$publish_dir"
          if git ls-remote --exit-code --heads "$repo_url" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$repo_url" "$publish_dir"
          else
            git clone --depth 1 "$repo_url" "$publish_dir"
            (
              cd "$publish_dir"
              git checkout --orphan gh-pages
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi
          mkdir -p "$publish_dir/semsearch"
          cp "$artifact_dir/index.db" "$publish_dir/semsearch/index.db"
          if [ -f "$artifact_dir/filehashes.db" ]; then
            cp "$artifact_dir/filehashes.db" "$publish_dir/semsearch/filehashes.db"
          else
            rm -f "$publish_dir/semsearch/filehashes.db"
          fi
          cp "$artifact_dir/manifest.json" "$publish_dir/semsearch/manifest.json"
          echo "::group::Publish payload"
          find "$publish_dir/semsearch" -maxdepth 1 -type f | sort
          echo "::endgroup::"
          (
            cd "$publish_dir"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add semsearch/index.db semsearch/manifest.json
            if [ -f semsearch/filehashes.db ]; then
              git add semsearch/filehashes.db
            fi
            if git diff --cached --quiet; then
              echo "No gh-pages changes to publish."
            else
              git commit -m "Publish semsearch index for ${GITHUB_SHA}"
              git push origin HEAD:gh-pages
            fi
          )
