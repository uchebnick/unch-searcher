name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPO: uchebnick/homebrew-tap

jobs:
  build:
    name: build-release-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            goos: darwin
            goarch: arm64
            asset_name: unch_Darwin_arm64.tar.gz
            archive_type: tar.gz
          - runner: macos-14
            goos: darwin
            goarch: amd64
            asset_name: unch_Darwin_x86_64.tar.gz
            archive_type: tar.gz
            cc: "clang -arch x86_64"
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: unch_Linux_x86_64.tar.gz
            archive_type: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            asset_name: unch_Windows_x86_64.zip
            archive_type: zip
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup MSYS2 toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Build Unix archive
        if: runner.os != 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc || '' }}
        run: |
          set -euo pipefail
          mkdir -p dist/build
          if [ -n "${CC}" ]; then
            export CC
          fi
          CGO_ENABLED=1 go build -trimpath -o dist/build/unch .
          tar -C dist/build -czf "dist/${{ matrix.asset_name }}" unch

      - name: Build Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: gcc
        run: |
          New-Item -ItemType Directory -Force -Path dist/build | Out-Null
          $env:PATH = "C:\msys64\mingw64\bin;$env:PATH"
          $env:CGO_ENABLED = "1"
          gcc --version
          go build -trimpath -o dist/build/unch.exe .
          if ($LASTEXITCODE -ne 0) {
            throw "go build failed on Windows release build step"
          }
          if (-not (Test-Path "dist/build/unch.exe")) {
            throw "expected dist/build/unch.exe to exist after go build"
          }
          Compress-Archive -Path dist/build/unch.exe -DestinationPath "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/checksums.txt

      - name: Prepare release notes
        run: |
          mkdir -p dist
          notes_file=".github/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_file" ]; then
            cp "$notes_file" dist/release-notes.md
          else
            {
              echo "# ${GITHUB_REF_NAME}"
              echo
              echo "Release published automatically from tag ${GITHUB_REF_NAME}."
            } > dist/release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: unch ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  publish-homebrew:
    name: publish-homebrew
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/checksums.txt

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not set; skipping Homebrew publish"
            exit 0
          fi

          version="${GITHUB_REF_NAME#v}"
          arm64_sha="$(awk '/unch_Darwin_arm64.tar.gz$/ {print $1}' dist/checksums.txt)"
          amd64_sha="$(awk '/unch_Darwin_x86_64.tar.gz$/ {print $1}' dist/checksums.txt)"

          if [ -z "$arm64_sha" ] || [ -z "$amd64_sha" ]; then
            echo "missing release checksums" >&2
            exit 1
          fi

          tap_dir="$(mktemp -d)"
          trap 'rm -rf "$tap_dir"' EXIT

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "$tap_dir"
          mkdir -p "$tap_dir/Formula"

          ./scripts/render_homebrew_formula.sh "$version" "$arm64_sha" "$amd64_sha" > "$tap_dir/Formula/unch.rb"

          cd "$tap_dir"
          if git diff --quiet -- Formula/unch.rb; then
            echo "homebrew formula is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/unch.rb
          git commit -m "chore: update unch to v${version}"
          git push origin HEAD:main
