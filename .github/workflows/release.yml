name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPO: uchebnick/homebrew-tap

jobs:
  build:
    name: build-release-assets
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build unch archives
        run: |
          mkdir -p dist/arm64 dist/amd64
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -trimpath -o dist/arm64/unch .
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 CC='clang -arch x86_64' go build -trimpath -o dist/amd64/unch .
          tar -C dist/arm64 -czf dist/unch_Darwin_arm64.tar.gz unch
          tar -C dist/amd64 -czf dist/unch_Darwin_x86_64.tar.gz unch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: dist

      - name: Generate checksums
        run: |
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Prepare release notes
        run: |
          mkdir -p dist
          notes_file=".github/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_file" ]; then
            cp "$notes_file" dist/release-notes.md
          else
            {
              echo "# ${GITHUB_REF_NAME}"
              echo
              echo "Release published automatically from tag ${GITHUB_REF_NAME}."
            } > dist/release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: unch ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  publish-homebrew:
    name: publish-homebrew
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: dist

      - name: Generate checksums
        run: |
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not set; skipping Homebrew publish"
            exit 0
          fi

          version="${GITHUB_REF_NAME#v}"
          arm64_sha="$(awk '/unch_Darwin_arm64.tar.gz$/ {print $1}' dist/checksums.txt)"
          amd64_sha="$(awk '/unch_Darwin_x86_64.tar.gz$/ {print $1}' dist/checksums.txt)"

          if [ -z "$arm64_sha" ] || [ -z "$amd64_sha" ]; then
            echo "missing release checksums" >&2
            exit 1
          fi

          tap_dir="$(mktemp -d)"
          trap 'rm -rf "$tap_dir"' EXIT

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "$tap_dir"
          mkdir -p "$tap_dir/Formula"

          ./scripts/render_homebrew_formula.sh "$version" "$arm64_sha" "$amd64_sha" > "$tap_dir/Formula/unch.rb"

          cd "$tap_dir"
          if git diff --quiet -- Formula/unch.rb; then
            echo "homebrew formula is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/unch.rb
          git commit -m "chore: update unch to v${version}"
          git push origin HEAD:main
