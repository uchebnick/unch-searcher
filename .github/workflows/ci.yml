name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: test-and-coverage
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          go test -covermode=atomic -coverprofile=coverage/coverage.out ./... | tee coverage/test.log
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt

      - name: Build coverage badge payload
        run: |
          total="$(awk '/^total:/ {print $3}' coverage/coverage.txt)"
          percent="${total%%%}"
          color="$(
            awk -v percent="$percent" 'BEGIN {
              if (percent < 0) percent = 0
              if (percent > 100) percent = 100

              # Keep the badge bright across the whole range:
              # red -> yellow -> green instead of a dark red/green mix.
              if (percent <= 50) {
                r = 255
                g = int((percent / 50) * 255)
              } else {
                r = int(((100 - percent) / 50) * 255)
                g = 255
              }
              b = 0

              printf "%02X%02X%02X", r, g, b
            }'
          )"

          printf '{"schemaVersion":1,"label":"coverage","message":"%s","color":"%s"}\n' "$total" "$color" > coverage/coverage-badge.json

          {
            echo "## Coverage"
            echo
            echo "- Total coverage: \`$total\`"
            echo
            echo '```text'
            cat coverage/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

      - name: Publish coverage badge
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          trap 'rm -rf "$publish_dir"' EXIT

          git init "$publish_dir" >/dev/null
          cd "$publish_dir"
          git checkout -b gh-pages >/dev/null
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth 1 origin gh-pages >/dev/null 2>&1; then
            git reset --hard FETCH_HEAD >/dev/null
          fi

          mkdir -p coverage
          cp "${GITHUB_WORKSPACE}/coverage/coverage-badge.json" coverage/coverage-badge.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage/coverage-badge.json

          if git diff --cached --quiet; then
            echo "coverage badge is already up to date"
            exit 0
          fi

          git commit -m "chore: update coverage badge"
          git push origin HEAD:gh-pages

  benchmark:
    name: benchmark-suite
    runs-on: macos-14

    env:
      SEMSEARCH_YZMA_PROCESSOR: cpu
      SEMSEARCH_YZMA_VERSION: b8581
      UNCH_BENCH_ROOT: ${{ github.workspace }}/.bench-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Restore benchmark cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UNCH_BENCH_ROOT }}/cache
          key: benchmark-${{ runner.os }}-${{ hashFiles('benchmarks/suites/smoke.json', 'go.mod') }}
          restore-keys: |
            benchmark-${{ runner.os }}-

      - name: Run benchmark suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p benchmarks/results
          go run ./cmd/bench \
            -suite "${GITHUB_WORKSPACE}/benchmarks/suites/smoke.json" \
            -bench-root "${UNCH_BENCH_ROOT}" \
            -results-dir "${GITHUB_WORKSPACE}/benchmarks/results" \
            -output "${GITHUB_WORKSPACE}/benchmarks/results/ci-benchmark.json" \
            2>&1 | tee "${GITHUB_WORKSPACE}/benchmarks/results/ci-benchmark.log"

      - name: Render benchmark summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f benchmarks/results/ci-benchmark.json ]; then
            python3 scripts/render_benchmark_summary.py benchmarks/results/ci-benchmark.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Benchmark"
              echo
              echo "Benchmark run did not produce a JSON report."
              if [ -f benchmarks/results/ci-benchmark.log ]; then
                echo
                echo "### Log tail"
                echo
                echo '```text'
                tail -n 120 benchmarks/results/ci-benchmark.log
                echo '```'
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmarks/results/
          if-no-files-found: warn
