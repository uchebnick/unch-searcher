name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: test-and-coverage
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          go test -covermode=atomic -coverprofile=coverage/coverage.out ./... | tee coverage/test.log
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt

      - name: Build coverage badge payload
        run: |
          total="$(awk '/^total:/ {print $3}' coverage/coverage.txt)"
          percent="${total%%%}"
          color="red"

          if awk "BEGIN {exit !($percent >= 85)}"; then
            color="brightgreen"
          elif awk "BEGIN {exit !($percent >= 70)}"; then
            color="yellow"
          fi

          printf '{"schemaVersion":1,"label":"coverage","message":"%s","color":"%s"}\n' "$total" "$color" > coverage/coverage-badge.json

          {
            echo "## Coverage"
            echo
            echo "- Total coverage: \`$total\`"
            echo
            echo '```text'
            cat coverage/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

      - name: Publish coverage badge
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          trap 'rm -rf "$publish_dir"' EXIT

          git init "$publish_dir" >/dev/null
          cd "$publish_dir"
          git checkout -b gh-pages >/dev/null
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth 1 origin gh-pages >/dev/null 2>&1; then
            git reset --hard FETCH_HEAD >/dev/null
          fi

          mkdir -p coverage
          cp "${GITHUB_WORKSPACE}/coverage/coverage-badge.json" coverage/coverage-badge.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage/coverage-badge.json

          if git diff --cached --quiet; then
            echo "coverage badge is already up to date"
            exit 0
          fi

          git commit -m "chore: update coverage badge"
          git push origin HEAD:gh-pages
