name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  PORTABLE_TEST_PACKAGES: >-
    ./internal/bench
    ./internal/indexing
    ./internal/runtime
    ./internal/search
    ./internal/termui

jobs:
  benchmark:
    name: benchmark-suite (${{ matrix.label }})
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-14
            label: macos
          - os: windows-latest
            label: windows-x86_64
            msystem: UCRT64
            msys_pkg: mingw-w64-ucrt-x86_64-gcc
            cc: gcc
            msys_release: true
            msys_update: true
            msys_cache: true
          - os: windows-11-arm
            label: windows-arm64
            msystem: CLANGARM64
            msys_pkg: mingw-w64-clang-aarch64-clang
            cc: clang
            msys_release: true
            msys_update: false
            msys_cache: false

    env:
      BENCHMARK_SUITE: benchmarks/suites/ci.json
      SEMSEARCH_YZMA_VERSION: b8581
      UNCH_BENCH_ROOT: ${{ github.workspace }}/.bench-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup MSYS2 toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          release: ${{ matrix.msys_release }}
          update: ${{ matrix.msys_update }}
          cache: ${{ matrix.msys_cache }}
          install: ${{ matrix.msys_pkg }}

      - name: Restore benchmark cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UNCH_BENCH_ROOT }}/cache
          key: benchmark-${{ runner.os }}-${{ matrix.label }}-${{ hashFiles('benchmarks/suites/ci.json', 'go.mod') }}
          restore-keys: |
            benchmark-${{ runner.os }}-${{ matrix.label }}-

      - name: Run benchmark suite
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p benchmarks/results
          go run ./cmd/bench \
            -suite "${GITHUB_WORKSPACE}/${BENCHMARK_SUITE}" \
            -bench-root "${UNCH_BENCH_ROOT}" \
            -cold-index-runs 1 \
            -warm-index-runs 1 \
            -warm-search-runs 1 \
            -results-dir "${GITHUB_WORKSPACE}/benchmarks/results" \
            -output "${GITHUB_WORKSPACE}/benchmarks/results/ci-benchmark.json" \
            2>&1 | tee "${GITHUB_WORKSPACE}/benchmarks/results/ci-benchmark.log"

      - name: Run benchmark suite
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          workspace_dir="$(cygpath -u "$GITHUB_WORKSPACE")"
          results_dir="${workspace_dir}/benchmarks/results"
          suite_path="${workspace_dir}/${BENCHMARK_SUITE}"
          json_path="${results_dir}/ci-benchmark.json"
          log_path="${results_dir}/ci-benchmark.log"
          export CGO_ENABLED=1
          export CC="${{ matrix.cc }}"
          mkdir -p "${results_dir}"
          go run ./cmd/bench \
            -suite "${suite_path}" \
            -bench-root "${UNCH_BENCH_ROOT}" \
            -cold-index-runs 1 \
            -warm-index-runs 1 \
            -warm-search-runs 1 \
            -results-dir "${results_dir}" \
            -output "${json_path}" 2>&1 | tee "${log_path}"

      - name: Render benchmark summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f benchmarks/results/ci-benchmark.json ]; then
            python scripts/render_benchmark_summary.py benchmarks/results/ci-benchmark.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Benchmark"
              echo
              echo "Benchmark run did not produce a JSON report."
              if [ -f benchmarks/results/ci-benchmark.log ]; then
                echo
                echo "### Log tail"
                echo
                echo '```text'
                tail -n 120 benchmarks/results/ci-benchmark.log
                echo '```'
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report-${{ matrix.label }}
          path: benchmarks/results/
          if-no-files-found: warn

  benchmark-summary:
    name: benchmark-summary
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) }}
    needs: benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Download benchmark artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-report-*
          path: benchmarks/summary-artifacts

      - name: Render cross-platform benchmark summary
        shell: bash
        run: |
          set -euo pipefail
          python scripts/render_benchmark_matrix_summary.py benchmarks/summary-artifacts >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify root go.mod has no replace directives
        shell: bash
        run: |
          set -euo pipefail
          if grep -nE '^[[:space:]]*replace[[:space:]]+' go.mod; then
            echo "root go.mod must not contain replace directives because they break go install github.com/...@version" >&2
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.7.2

  test-matrix:
    name: test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-14
            label: macos
          - os: windows-latest
            label: windows-x86_64
            msystem: UCRT64
            msys_pkg: mingw-w64-ucrt-x86_64-gcc
            cc: gcc
            msys_release: true
            msys_update: true
            msys_cache: true
          - os: windows-11-arm
            label: windows-arm64
            msystem: CLANGARM64
            msys_pkg: mingw-w64-clang-aarch64-clang
            cc: clang
            msys_release: true
            msys_update: false
            msys_cache: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup MSYS2 toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          release: ${{ matrix.msys_release }}
          update: ${{ matrix.msys_update }}
          cache: ${{ matrix.msys_cache }}
          install: ${{ matrix.msys_pkg }}

      - name: Build all packages
        if: runner.os != 'Windows'
        run: go build ./...

      - name: Build all packages
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export CGO_ENABLED=1
          export CC="${{ matrix.cc }}"
          go build ./...

      - name: Run portable test suite
        if: runner.os != 'Windows'
        run: go test ${{ env.PORTABLE_TEST_PACKAGES }}

      - name: Run portable test suite
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export CGO_ENABLED=1
          export CC="${{ matrix.cc }}"
          go test $PORTABLE_TEST_PACKAGES

  install-smoke:
    name: install-smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            asset_name: unch_Linux_x86_64.tar.gz
          - os: ubuntu-24.04-arm
            label: linux-arm64
            asset_name: unch_Linux_arm64.tar.gz
          - os: macos-14
            label: macos
            asset_name: unch_Darwin_arm64.tar.gz
          - os: windows-latest
            label: windows-x86_64
            asset_name: unch_Windows_x86_64.zip
            msystem: UCRT64
            msys_pkg: mingw-w64-ucrt-x86_64-gcc
            cc: gcc
            msys_release: true
            msys_update: true
            msys_cache: true
          - os: windows-11-arm
            label: windows-arm64
            asset_name: unch_Windows_arm64.zip
            msystem: CLANGARM64
            msys_pkg: mingw-w64-clang-aarch64-clang
            cc: clang
            msys_release: true
            msys_update: false
            msys_cache: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup MSYS2 toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          release: ${{ matrix.msys_release }}
          update: ${{ matrix.msys_update }}
          cache: ${{ matrix.msys_cache }}
          install: ${{ matrix.msys_pkg }}

      - name: Build local Unix release asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="${RUNNER_TEMP}/release-assets"
          mkdir -p "${asset_dir}" "${RUNNER_TEMP}/build"
          CGO_ENABLED=1 go build -trimpath -o "${RUNNER_TEMP}/build/unch" ./cmd/unch
          tar -C "${RUNNER_TEMP}/build" -czf "${asset_dir}/${{ matrix.asset_name }}" unch

      - name: Build local Windows release asset
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          build_dir="$(cygpath -u "$RUNNER_TEMP")/build"
          mkdir -p "${build_dir}"
          export CGO_ENABLED=1
          export CC="${{ matrix.cc }}"
          go build -trimpath -o "${build_dir}/unch.exe" ./cmd/unch

      - name: Archive local Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetDir = Join-Path $env:RUNNER_TEMP "release-assets"
          $buildDir = Join-Path $env:RUNNER_TEMP "build"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          Compress-Archive -Path (Join-Path $buildDir "unch.exe") -DestinationPath (Join-Path $assetDir "${{ matrix.asset_name }}") -Force

      - name: Install from local asset with shell installer
        if: runner.os != 'Windows'
        shell: bash
        env:
          UNCH_INSTALL_ASSET_DIR: ${{ runner.temp }}/release-assets
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/unch-bin"
          ./install.sh -b "${bin_dir}" -v vci-test
          "${bin_dir}/unch" --help >/dev/null

      - name: Install from local asset with PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          UNCH_INSTALL_ASSET_DIR: ${{ runner.temp }}\release-assets
        run: |
          $binDir = Join-Path $env:RUNNER_TEMP "unch-bin"
          .\install\install.ps1 -BinDir $binDir -Version vci-test
          & (Join-Path $binDir "unch.exe") --help | Out-Null

  install-smoke-linux-distros:
    name: install-smoke-linux (${{ matrix.label }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu
            image: ubuntu:24.04
            prepare: >-
              apt-get update &&
              apt-get install -y --no-install-recommends ca-certificates curl gzip tar
          - label: debian
            image: debian:bookworm-slim
            prepare: >-
              apt-get update &&
              apt-get install -y --no-install-recommends ca-certificates curl gzip tar
          - label: arch
            image: archlinux:latest
            prepare: >-
              pacman -Syu --noconfirm --needed archlinux-keyring &&
              pacman -S --noconfirm --needed ca-certificates curl gzip tar

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build local Linux release asset
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="${RUNNER_TEMP}/release-assets"
          mkdir -p "${asset_dir}" "${RUNNER_TEMP}/build"
          CGO_ENABLED=1 go build -trimpath -o "${RUNNER_TEMP}/build/unch" ./cmd/unch
          tar -C "${RUNNER_TEMP}/build" -czf "${asset_dir}/unch_Linux_x86_64.tar.gz" unch

      - name: Install from local asset inside ${{ matrix.label }} container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -v "${RUNNER_TEMP}/release-assets:/assets" \
            -w /src \
            "${{ matrix.image }}" sh -lc '
              set -eu
              '"${{ matrix.prepare }}"'
              export UNCH_INSTALL_ASSET_DIR=/assets
              ./install.sh -b /tmp/bin -v vci-test
              /tmp/bin/unch --help >/dev/null
            '

  install-smoke-nix:
    name: install-smoke-linux (nix)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build local Linux release asset
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="${RUNNER_TEMP}/release-assets"
          mkdir -p "${asset_dir}" "${RUNNER_TEMP}/build"
          CGO_ENABLED=1 go build -trimpath -o "${RUNNER_TEMP}/build/unch" ./cmd/unch
          tar -C "${RUNNER_TEMP}/build" -czf "${asset_dir}/unch_Linux_x86_64.tar.gz" unch

      - name: Install from local asset inside nix container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -v "${RUNNER_TEMP}/release-assets:/assets" \
            -w /src \
            nixos/nix:latest sh -lc '
              set -eu
              nix --extra-experimental-features "nix-command flakes" \
                shell nixpkgs#curl nixpkgs#gnutar nixpkgs#gzip nixpkgs#coreutils nixpkgs#cacert \
                --command sh -lc "
                  set -eu
                  export UNCH_INSTALL_ASSET_DIR=/assets
                  ./install.sh -b /tmp/bin -v vci-test
                  /tmp/bin/unch --help >/dev/null
                "
            '

  go-install-smoke:
    name: go-install-smoke (bookworm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and run with go install inside official Go container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -w /src \
            golang:1.25-bookworm sh -c '
              set -eu
              go install -buildvcs=false ./cmd/unch
              command -v unch
              unch --help >/dev/null
            '

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          go test -covermode=atomic -coverprofile=coverage/coverage.out ${{ env.PORTABLE_TEST_PACKAGES }} | tee coverage/test.log
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt

      - name: Build coverage badge payload
        run: |
          total="$(awk '/^total:/ {print $3}' coverage/coverage.txt)"
          percent="${total%%%}"
          color="$(
            awk -v percent="$percent" 'BEGIN {
              if (percent < 0) percent = 0
              if (percent > 100) percent = 100

              # Keep the badge bright across the whole range:
              # red -> yellow -> green instead of a dark red/green mix.
              if (percent <= 50) {
                r = 255
                g = int((percent / 50) * 255)
              } else {
                r = int(((100 - percent) / 50) * 255)
                g = 255
              }
              b = 0

              printf "%02X%02X%02X", r, g, b
            }'
          )"

          printf '{"schemaVersion":1,"label":"coverage","message":"%s","color":"%s"}\n' "$total" "$color" > coverage/coverage-badge.json

          {
            echo "## Coverage"
            echo
            echo "- Scope: portable package set"
            echo "- Total coverage: \`$total\`"
            echo
            echo '```text'
            cat coverage/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

      - name: Publish coverage badge
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          trap 'rm -rf "$publish_dir"' EXIT

          git init "$publish_dir" >/dev/null
          cd "$publish_dir"
          git checkout -b gh-pages >/dev/null
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth 1 origin gh-pages >/dev/null 2>&1; then
            git reset --hard FETCH_HEAD >/dev/null
          fi

          mkdir -p coverage
          cp "${GITHUB_WORKSPACE}/coverage/coverage-badge.json" coverage/coverage-badge.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage/coverage-badge.json

          if git diff --cached --quiet; then
            echo "coverage badge is already up to date"
            exit 0
          fi

          git commit -m "chore: update coverage badge"
          git push origin HEAD:gh-pages
