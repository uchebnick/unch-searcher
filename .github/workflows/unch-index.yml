name: unch-index

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Ignore the published snapshot and rebuild the index from scratch
        required: false
        default: false
        type: boolean
      skip_remote_restore:
        description: Skip downloading the published snapshot before indexing
        required: false
        default: false
        type: boolean
      skip_publish:
        description: Build the index but do not publish it back to gh-pages
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  index:
    uses: ./.github/workflows/unch-index-reusable.yml
    with:
      force_rebuild: ${{ github.event.inputs.force_rebuild == 'true' }}
      skip_remote_restore: ${{ github.event.inputs.skip_remote_restore == 'true' }}
      skip_publish: ${{ github.event.inputs.skip_publish == 'true' }}
      unch_repository: ${{ github.repository }}
      unch_ref: ${{ github.sha }}
    secrets: inherit
